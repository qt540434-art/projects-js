<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caculator</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <div class="main-caculator">
        <input class="display-screen" placeholder="" />
        <button class="cancle-button">C</button>
        <div class="remove-button">←</div>
        <div class="divide-button">÷</div>
        <div class="multiply-button">x</div>
        <div class="subtract-button">-</div>
        <div class="add-button">+</div>
        <div class="equal-button">=</div>
        <div class="button-0">0</div>
        <div class="button-1">1</div>
        <div class="button-2">2</div>
        <div class="button-3">3</div>
        <div class="button-4">4</div>
        <div class="button-5">5</div>
        <div class="button-6">6</div>
        <div class="button-7">7</div>
        <div class="button-8">8</div>
        <div class="button-9">9</div>
    </div>
    <script src="./index.js"></script>
</body>
</html>
